<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus - ERLC Moderation Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #050505;
      color: #ffffff;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center">

  <header class="w-full max-w-7xl mt-6 px-6">
    <div class="flex items-center justify-between bg-[#0d0d0d] border border-[#1f1f1f] py-3 px-6 rounded-full shadow-lg">
      <div class="flex items-center space-x-2">
        <div class="text-xl font-black tracking-tighter italic">
          <span class="text-blue-600">N</span>EXUS
        </div>
      </div>
      
      <nav class="flex items-center space-x-6 text-sm font-medium text-slate-400">
      </nav>
    </div>
  </header>
 
  <main class="flex-grow flex flex-col items-center justify-center text-center px-6 py-20">
    <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight max-w-3xl leading-tight">
      New and Free accessible platform for roblox moderation in ERLC.
    </h1>
    
    <p class="text-slate-400 mt-6 max-w-xl text-lg">
      Nexus Is a new platform available to small communities In financial situations for more accessibility.
    </p>
    
    <div class="mt-10">
      <div id="countdown" class="text-2xl font-bold mb-4">
        <span id="countdown-display" class="text-blue-500">Loading...</span>
      </div>
      <button id="discordLoginBtn" disabled class="bg-[#5865F2]/50 cursor-not-allowed text-white font-bold px-8 py-4 rounded-xl shadow-lg transition duration-150 flex items-center space-x-3 opacity-50">
        <svg class="w-6 h-6 fill-white" viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg"><path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.72-10.93,68.6,68.6,0,0,1-10.64-5.12c.91-.67,1.81-1.37,2.67-2.1a75.22,75.22,0,0,0,72.68,0c.87.73,1.76,1.43,2.67,2.1a68.86,68.86,0,0,1-10.64,5.12,74.74,74.74,0,0,0,6.72,10.93,105.73,105.73,0,0,0,31.6-18.83C129.58,50.14,123.76,27.32,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/></svg>
        <span>Sign-Up with Discord</span>
      </button>
    </div>
  </main>

  <footer class="w-full text-center py-8 text-xs text-slate-600">
    &copy; 2026 Nexus Platform. Built for Emergency Response: Liberty County communities.
  </footer>

  <script>
    const launchDate = new Date('2026-08-20T00:00:00').getTime();
    const countdownDisplay = document.getElementById('countdown-display');
    const discordBtn = document.getElementById('discordLoginBtn');

    const countdown = setInterval(() => {
      const now = new Date().getTime();
      const distance = launchDate - now;

      if (distance <= 0) {
        countdownDisplay.textContent = 'Launch time reached!';
        discordBtn.disabled = false;
        discordBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-[#5865F2]/50');
        discordBtn.classList.add('bg-[#5865F2]', 'hover:bg-[#4752C4]', 'cursor-pointer');
        clearInterval(countdown);
      } else {
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
        countdownDisplay.innerHTML = `Launching in: <span class="text-blue-500">${days}d ${hours}h ${minutes}m ${seconds}s</span>`;
      }
    }, 1000);

    discordBtn.addEventListener('click', () => {
      if (!discordBtn.disabled) {
        window.location.href = '/Main%20Dashboard/login%20page.html';
      }
    });
  </script>

</body>
</html>
